<!doctype html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="개발자 포트폴리오" />
    <!-- PNG 파비콘을 SVG보다 먼저 둔다 — iOS Safari는 SVG 파비콘을 쓰지 않는데, SVG가 첫 후보면
         쓸 아이콘을 못 찾았다고 보고 도메인 첫 글자로 타일을 만들어 버린다(탭에 보라색 'P'). -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- apple-touch-icon은 알파 없는 불투명 PNG여야 한다(투명 PNG는 iOS가 버린다).
         모서리도 비우지 않는다 — iOS가 자체 마스크를 씌우므로 전면으로 채운 이미지를 준다. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="Shin's Portfolio" />
    <title>Shin's Portfolio</title>
    <style>
      /* 스플래시 크리티컬 CSS — 번들 CSS/JS가 오기 전에 HTML만으로 첫 화면을 그린다.
         React가 #root를 렌더하는 순간 스플래시 마크업은 자동으로 교체되어 사라진다.
         주의: html에 배경을 주면 body 배경의 캔버스 승격이 끊겨 -z-10 앰비언트 오브가
         body 배경 뒤로 가려진다 — 배경은 스플래시 div 자신에게만 준다. */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #111113;
      }
      #splash svg {
        width: 56px;
        height: 56px;
        animation: splash-pulse 1.6s ease-in-out infinite;
      }
      #splash p {
        margin: 0;
        font:
          600 14px/1 -apple-system,
          BlinkMacSystemFont,
          system-ui,
          sans-serif;
        letter-spacing: -0.01em;
        color: #a1a1aa;
      }
      @keyframes splash-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash" aria-hidden="true">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="sp-ring" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#66dc7e" /><stop offset="1" stop-color="#7f7fea" /></linearGradient>
            <linearGradient id="sp-mk" gradientUnits="userSpaceOnUse" x1="150" y1="150" x2="410" y2="360"><stop offset="0" stop-color="#66dc7e" /><stop offset="1" stop-color="#7f7fea" /></linearGradient>
          </defs>
          <rect x="16" y="16" width="480" height="480" rx="118" fill="#111113" />
          <rect x="26" y="26" width="460" height="460" rx="108" fill="none" stroke="url(#sp-ring)" stroke-width="14" />
          <g fill="none" stroke="url(#sp-mk)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
            <path d="M156 156 L268 256 L156 356" />
            <path d="M300 356 L404 356" />
          </g>
        </svg>
        <p>Shin's Portfolio</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
